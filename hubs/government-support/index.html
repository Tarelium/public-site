<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Government Support Hub - Tarelium</title>
  <meta name="description" content="See how Tarelium manages government funding, compliance reporting, and student support scheme obligations. Explore guided demos as a Student or Application Reviewer." />
  <link rel="stylesheet" href="../../assets/css/shared.css" />
</head>
<body>
  <div id="site-header"></div>
  <div id="breadcrumb"></div>

  <main class="page-main">
    <div class="hub-hero" id="hubHero"></div>
    <div class="section-label">Select a Persona to begin the walkthrough</div>
    <div class="persona-grid" id="personaGrid"></div>
  </main>

  <script src="../../assets/js/shared.js"></script>
  <script>
    const HUB = {
      name: "Government Support Hub",
      slug: "government-support",
      color: "#2B5F9E",
      pastel: "#C5DDF5",
      desc: "Manage government funding, compliance reporting, and student support scheme obligations.",
      comingSoon: false,
      personas: [
        {
          name: "Student",
          slug: "student",
          desc: "Access government funding information, submit support applications, and manage your compliance requirements.",
          icon: `<svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3.33 2 8.67 2 12 0v-5"/></svg>`
        },
        {
          name: "Application Reviewer",
          slug: "application-reviewer",
          desc: "Review and assess submitted government support applications, verify eligibility, and manage approval decisions.",
          icon: `<svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><polyline points="9 12 11 14 15 10"/></svg>`
        }
      ]
    };

    document.documentElement.style.setProperty('--hub-color', HUB.color);
    renderHeader({ backHref: '../../guided-demos.html', backLabel: 'Guided Demos' });
    renderBreadcrumb([
      { label: 'Guided Demos', href: '../../guided-demos.html' },
      { label: HUB.name }
    ]);

    document.getElementById('hubHero').style.setProperty('--hub-color', HUB.color);
    document.getElementById('hubHero').innerHTML = `
      <div class="hub-hero-badge">${esc(HUB.name)}</div>
      <h2>${esc(HUB.name)}</h2>
      <p>${esc(HUB.desc)}</p>`;

    renderPersonaGrid(HUB);
  </script>
</body>
</html>
